<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
<title>فروشگاه لوازم خیاطی الخلیل</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#0d5c8c;--blue-dark:#073b5c;--blue-light:#e7f2f9;--blue-mid:#bfe0f0;
  --accent:#f2a93b;--accent-light:#fef3e0;
  --bg:#eef3f6;--white:#fff;--gray:#85909a;--text:#1f2a33;
  --radius:16px;--shadow:0 2px 12px rgba(13,92,140,.10);
}
html,body{height:100%;overflow:hidden}
body{font-family:'Vazirmatn',sans-serif;background:#06222f}

.shell{
  width:100%;max-width:460px;display:flex;flex-direction:column;
  position:fixed;inset:0;margin:0 auto;
  border-radius:0;overflow:hidden;box-shadow:none;
}
@media (min-width:480px){
  .shell{
    inset:2vh auto auto auto; top:2vh; bottom:2vh; left:50%; transform:translateX(-50%);
    height:96vh; height:96dvh; max-height:760px; border-radius:22px;
    box-shadow:0 30px 80px rgba(0,0,0,.6);
  }
}

/* HEADER */
.hdr{background:linear-gradient(150deg,var(--blue-dark) 0%,var(--blue) 100%);padding:0 16px;flex-shrink:0}
.hdr-top{display:flex;align-items:center;gap:11px;padding:15px 0 11px;transition:padding .25s ease}
.hdr.compact .hdr-top{padding:9px 0 7px}
.hdr.compact .logo-circle{width:34px;height:44px;transition:width .25s ease, height .25s ease}
.hdr.compact .hdr-info h1{font-size:14.5px}
.hdr.compact .hdr-info p{font-size:10.5px}
.logo-circle{width:48px;height:62px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-circle svg{width:100%;height:100%}
.hdr-info{flex:1;min-width:0}
.hdr-info h1{font-size:17px;font-weight:800;color:#fff;letter-spacing:.01em}
.hdr-info p{font-size:11.5px;color:rgba(255,255,255,.75);margin-top:2px;display:flex;align-items:center;gap:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dot{width:6px;height:6px;background:#52d68a;border-radius:50%;display:inline-block;flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.hdr-actions{display:flex;gap:6px;flex-shrink:0}
.hdr-btn{background:rgba(255,255,255,.16);border:none;color:#fff;border-radius:20px;padding:6px 11px;font-size:11.5px;font-family:'Vazirmatn',sans-serif;cursor:pointer;transition:.2s;white-space:nowrap}
.hdr-btn:hover{background:rgba(255,255,255,.3)}

.search-bar{display:flex;align-items:center;background:rgba(255,255,255,.16);border-radius:25px;padding:7px 13px;margin-bottom:12px;gap:8px}
.search-bar input{flex:1;background:none;border:none;outline:none;color:#fff;font-family:'Vazirmatn',sans-serif;font-size:14.5px;direction:rtl}
.search-bar input::placeholder{color:rgba(255,255,255,.6)}
.search-bar svg{flex-shrink:0}

.hdr-collapsible{max-height:200px;overflow:hidden;transition:max-height .25s ease, opacity .2s ease;opacity:1}
.hdr.compact .hdr-collapsible{max-height:0;opacity:0}
.filter-row{display:flex;gap:6px;padding-bottom:12px;overflow-x:auto;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.chip{background:rgba(255,255,255,.16);border:1.5px solid rgba(255,255,255,.25);color:rgba(255,255,255,.9);border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;white-space:nowrap;transition:.2s;font-family:'Vazirmatn',sans-serif}
.chip.active,.chip:hover{background:#fff;color:var(--blue-dark);border-color:transparent;font-weight:700}

/* MESSAGES */
.msgs{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 13px;display:flex;flex-direction:column;gap:10px;background:var(--bg);scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--blue-mid);border-radius:4px}
.msg{max-width:88%;animation:fadeUp .22s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.bot{align-self:flex-start}.msg.user{align-self:flex-end}
.bubble{padding:10px 14px;border-radius:var(--radius);font-size:14.5px;line-height:1.85}
.msg.bot .bubble{background:var(--white);color:var(--text);border-bottom-right-radius:5px;box-shadow:var(--shadow)}
.msg.user .bubble{background:var(--blue);color:#fff;border-bottom-left-radius:5px}
.msg-time{font-size:10.5px;color:#a9b6bf;margin-top:3px;padding:0 3px}
.msg.user .msg-time{text-align:left}

.qbtns{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.qbtn{background:var(--white);border:1.5px solid var(--blue);color:var(--blue);padding:7px 13px;border-radius:20px;font-size:13px;cursor:pointer;font-family:'Vazirmatn',sans-serif;transition:.2s;font-weight:500;box-shadow:var(--shadow)}
.qbtn:hover{background:var(--blue);color:#fff}

.typing-wrap{display:flex;gap:5px;align-items:center;padding:10px 14px;background:var(--white);border-radius:var(--radius);border-bottom-right-radius:5px;width:fit-content;box-shadow:var(--shadow)}
.typing-wrap span{width:6px;height:6px;background:var(--blue);border-radius:50%;animation:bounce 1.2s infinite}
.typing-wrap span:nth-child(2){animation-delay:.2s}.typing-wrap span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-6px);opacity:1}}

/* INPUT */
.inp-area{padding:11px 13px;background:var(--white);border-top:1px solid #e3eaf0;display:flex;gap:8px;align-items:center;flex-shrink:0}
.inp-area input{flex:1;border:1.5px solid #ddd;border-radius:25px;padding:10px 15px;font-family:'Vazirmatn',sans-serif;font-size:14.5px;outline:none;background:#fafafa;direction:rtl;transition:.2s}
.inp-area input:focus{border-color:var(--blue);background:#fff}
.send-btn{width:40px;height:40px;background:var(--blue);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s}
.send-btn:hover{background:var(--blue-dark)}.send-btn:active{transform:scale(.93)}
.send-btn svg{width:17px;height:17px;fill:#fff}

/* PRODUCT CARD */
.pcard{background:var(--white);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-top:6px;max-width:290px;border:1px solid #eef3f6}
.pcard-img{width:100%;height:150px;object-fit:cover;display:block;cursor:pointer;background:var(--blue-light)}
.pcard-no-img{width:100%;height:100px;background:linear-gradient(135deg,var(--blue-light),var(--blue-mid));display:flex;align-items:center;justify-content:center;font-size:34px}
.pcard-body{padding:12px 14px}
.pcard-name{font-weight:700;font-size:15px;color:var(--blue-dark);margin-bottom:2px}
.pcard-badge{display:inline-block;background:var(--accent-light);color:#b5780f;font-size:11.5px;font-weight:600;border-radius:10px;padding:3px 9px;margin-bottom:8px}
.pcard-sizes{display:flex;flex-direction:column;gap:3px;margin-bottom:9px}
.pcard-row{display:flex;justify-content:space-between;font-size:13.5px;padding:4px 0;border-bottom:1px solid #f5f5f5}
.pcard-row:last-child{border:none}
.pcard-slabel{color:#555}.pcard-price{font-weight:700;color:var(--blue)}
.pcard-actions{display:flex;gap:7px}
.btn-order{flex:1;background:var(--blue);color:#fff;border:none;padding:9px;font-family:'Vazirmatn',sans-serif;font-size:13.5px;font-weight:600;cursor:pointer;border-radius:10px;transition:.2s}
.btn-order:hover{background:var(--blue-dark)}
.btn-size-guide{background:var(--accent-light);color:#b5780f;border:none;padding:9px 11px;font-family:'Vazirmatn',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border-radius:10px;white-space:nowrap}

/* category browse card (for category listing in chat) */
.cat-list{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);margin-top:6px;max-width:290px;overflow:hidden;border:1px solid #eef3f6}
.cat-list-item{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border-bottom:1px solid #f2f2f2;cursor:pointer;transition:.15s}
.cat-list-item:last-child{border:none}
.cat-list-item:hover{background:var(--blue-light)}
.cat-list-name{font-size:14px;font-weight:600;color:var(--text)}
.cat-list-arrow{color:var(--blue);font-size:16px}

/* ORDER FORM */
.oform{background:var(--white);border:1.5px solid var(--blue);border-radius:var(--radius);padding:15px;margin-top:6px;max-width:300px}
.oform h4{font-size:14.5px;font-weight:700;color:var(--blue-dark);margin-bottom:10px;border-bottom:1px solid var(--blue-light);padding-bottom:8px}
.ofield{display:flex;flex-direction:column;gap:4px;margin-bottom:9px}
.ofield label{font-size:12.5px;color:#666;font-weight:500}
.ofield input,.ofield select,.ofield textarea{border:1.5px solid #ddd;border-radius:9px;padding:9px 12px;font-family:'Vazirmatn',sans-serif;font-size:14px;outline:none;background:#fafafa;direction:rtl}
.ofield input:focus,.ofield select:focus{border-color:var(--blue)}
.ofield textarea{resize:none;height:58px}
.btn-wa{width:100%;background:#25d366;color:#fff;border:none;border-radius:10px;padding:11px;font-family:'Vazirmatn',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;margin-top:4px}
.btn-wa:hover{background:#128c7e}
.wa-hint{font-size:11px;color:#999;text-align:center;margin-top:6px}

/* TRACKING */
.track-box{background:var(--white);border-radius:var(--radius);padding:15px;box-shadow:var(--shadow);margin-top:6px;max-width:300px}
.track-box h4{font-size:14.5px;font-weight:700;color:var(--blue-dark);margin-bottom:10px}
.track-item{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px}
.track-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.track-icon.done{background:var(--blue-light)}
.track-icon.active{background:var(--accent-light)}
.track-icon.pending{background:#f5f5f5}
.track-label{font-size:13.5px;font-weight:600;color:var(--text)}
.track-sub{font-size:12px;color:var(--gray);margin-top:2px}

/* SIZE GUIDE */
.sg-table{background:var(--white);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-top:6px;font-size:13px}
.sg-head{background:var(--blue);color:#fff;padding:9px 13px;font-weight:700;font-size:13.5px}
.sg-row{display:flex;border-bottom:1px solid #f0f0f0}
.sg-row:last-child{border:none}
.sg-row:nth-child(even){background:#f9fbfd}
.sg-cell{flex:1;padding:8px 11px;color:#444}
.sg-cell.head{font-weight:600;color:var(--blue-dark);background:var(--blue-light)}
.sg-note{font-size:12px;color:#888;padding:8px 12px;background:#fafafa;border-top:1px solid #f0f0f0}

/* contact card */
.contact-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);margin-top:6px;max-width:290px;overflow:hidden;border:1px solid #eef3f6}
.contact-head{background:linear-gradient(135deg,var(--blue-dark),var(--blue));padding:16px;text-align:center;color:#fff}
.contact-head .logo-big{width:58px;height:58px;display:flex;align-items:center;justify-content:center;margin:0 auto 8px}
.contact-head .logo-big svg{width:100%;height:100%}
.contact-body{padding:14px}
.contact-row{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid #f2f2f2;font-size:13px}
.contact-row:last-child{border:none}
.contact-icon{width:26px;flex-shrink:0;text-align:center}
.contact-link{color:var(--blue);text-decoration:none;font-weight:600}

/* LIGHTBOX */
.lbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;display:none;align-items:center;justify-content:center}
.lbox.open{display:flex}
.lbox img{max-width:95vw;max-height:90vh;border-radius:12px;object-fit:contain}
.lbox-close{position:absolute;top:14px;left:14px;background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* OVERLAY / MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:none;align-items:center;justify-content:center;padding:12px}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:20px;width:100%;max-width:460px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.4)}
.modal-hdr{background:linear-gradient(135deg,var(--blue-dark),var(--blue));color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-hdr h2{font-size:14px;font-weight:700}
.modal-close{background:rgba(255,255,255,.18);border:none;color:#fff;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.modal-body{overflow-y:auto;padding:14px;flex:1}
.modal-body::-webkit-scrollbar{width:3px}
.modal-body::-webkit-scrollbar-thumb{background:var(--blue-mid);border-radius:4px}

.login-box{display:flex;flex-direction:column;gap:12px;padding:8px 0}
.login-box h3{font-size:14px;color:#333;text-align:center}
.login-box input{border:1.5px solid #ddd;border-radius:10px;padding:10px 14px;font-family:'Vazirmatn',sans-serif;font-size:14px;outline:none;direction:ltr;text-align:center}
.login-box input:focus{border-color:var(--blue)}
.login-btn{background:var(--blue);color:#fff;border:none;border-radius:10px;padding:11px;font-family:'Vazirmatn',sans-serif;font-size:14px;font-weight:600;cursor:pointer}
.err-msg{color:#c0392b;font-size:12px;text-align:center}

.apanel{display:none;flex-direction:column}
.apanel.active{display:flex}
.tab-bar{display:flex;border-bottom:2px solid var(--blue-light);margin-bottom:12px;flex-shrink:0;overflow-x:auto}
.tab-bar::-webkit-scrollbar{display:none}
.tab{flex:1;padding:8px 4px;text-align:center;font-size:11px;font-weight:600;color:#888;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.2s;white-space:nowrap}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tc{display:none}.tc.active{display:block}

.apc{background:#f7fafc;border:1px solid var(--blue-mid);border-radius:12px;padding:12px;margin-bottom:10px}
.apc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;gap:8px}
.apc-name{font-weight:700;font-size:13px;color:var(--blue-dark)}
.apc-cat{font-size:10.5px;color:var(--gray);background:var(--blue-light);border-radius:7px;padding:2px 7px;margin-right:6px}
.btn-del{background:#fdecea;border:1px solid #f5c6c6;color:#c0392b;border-radius:8px;padding:4px 9px;font-size:11px;cursor:pointer;font-family:'Vazirmatn',sans-serif;flex-shrink:0}
.btn-del:hover{background:#c0392b;color:#fff}
.sizes-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.si{display:flex;flex-direction:column;gap:3px}
.si label{font-size:11px;color:#666}
.si input{border:1px solid #ddd;border-radius:8px;padding:6px 8px;font-size:12px;font-family:'Vazirmatn',sans-serif;outline:none;direction:ltr;text-align:right}
.si input:focus{border-color:var(--blue)}
.img-up{border:2px dashed #8ab8d4;border-radius:10px;padding:12px;text-align:center;cursor:pointer;margin-bottom:9px;position:relative;transition:.2s}
.img-up:hover{background:var(--blue-light)}
.img-up input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.img-up-txt{font-size:11.5px;color:#888}

.add-form{background:var(--blue-light);border:1.5px dashed #8ab8d4;border-radius:12px;padding:13px}
.add-form h4{font-size:13px;font-weight:700;color:var(--blue);margin-bottom:10px}
.frow{display:flex;flex-direction:column;gap:4px;margin-bottom:9px}
.frow label{font-size:12px;color:#555;font-weight:500}
.frow input,.frow select{border:1.5px solid #ddd;border-radius:9px;padding:8px 11px;font-family:'Vazirmatn',sans-serif;font-size:13px;outline:none;background:#fff}
.frow input:focus{border-color:var(--blue)}
.sz-rows{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.szr{display:flex;gap:6px;align-items:center}
.szr input{flex:1;border:1.5px solid #ddd;border-radius:9px;padding:7px 9px;font-family:'Vazirmatn',sans-serif;font-size:12px;outline:none;background:#fff}
.szr input:focus{border-color:var(--blue)}
.btn-add-sz{background:var(--white);border:1.5px solid var(--blue);color:var(--blue);border-radius:8px;padding:5px 9px;font-size:11px;cursor:pointer;font-family:'Vazirmatn',sans-serif;white-space:nowrap}
.btn-rem-sz{background:#fdecea;border:1px solid #f5c6c6;color:#c0392b;border-radius:8px;padding:5px 7px;font-size:11px;cursor:pointer}
.btn-save{background:var(--blue);color:#fff;border:none;border-radius:10px;padding:10px;font-family:'Vazirmatn',sans-serif;font-size:13px;font-weight:600;cursor:pointer;width:100%;margin-top:6px}
.btn-save:hover{background:var(--blue-dark)}
.toast{background:var(--blue-light);border:1px solid #8ab8d4;color:var(--blue-dark);border-radius:10px;padding:8px 12px;text-align:center;font-size:12px;font-weight:600;margin-top:8px;display:none}

.ocard{background:#f7fafc;border:1px solid var(--blue-mid);border-radius:12px;padding:12px;margin-bottom:9px}
.ocard-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.onum{font-weight:700;font-size:12.5px;color:var(--blue-dark)}
.otime{font-size:10.5px;color:#aaa}
.odetail{font-size:12px;color:#444;line-height:1.9}
.obadge{display:inline-block;border-radius:8px;padding:2px 8px;font-size:10.5px;font-weight:600;margin-top:5px}
.obadge.new{background:var(--accent-light);color:#b5780f}
.obadge.done{background:var(--blue-light);color:var(--blue-dark)}
.ocard-btns{display:flex;gap:6px;margin-top:8px}
.btn-wa-sm{background:#25d366;color:#fff;border:none;border-radius:8px;padding:6px 10px;font-size:11.5px;font-family:'Vazirmatn',sans-serif;cursor:pointer;display:flex;align-items:center;gap:4px}
.btn-done{background:var(--blue-light);color:var(--blue-dark);border:none;border-radius:8px;padding:6px 10px;font-size:11.5px;font-family:'Vazirmatn',sans-serif;cursor:pointer}
.no-orders{text-align:center;color:#aaa;font-size:13px;padding:24px 0}
.orders-stats{display:flex;gap:8px;margin-bottom:12px}
.stat-box{flex:1;background:var(--blue-light);border-radius:10px;padding:10px;text-align:center}
.stat-num{font-size:18px;font-weight:800;color:var(--blue-dark)}
.stat-label{font-size:10.5px;color:#666;margin-top:2px}

.ssec{margin-bottom:16px}
.ssec h4{font-size:13px;font-weight:700;color:var(--blue);margin-bottom:8px;border-bottom:1px solid var(--blue-light);padding-bottom:5px}

.cat-section-title{font-size:11.5px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:.04em;margin:14px 0 8px;padding-right:2px}
.cat-section-title:first-child{margin-top:0}
</style>
</head>
<body>
<div class="shell">
  <div class="hdr">
    <div class="hdr-top">
      <div class="logo-circle">
        <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
          <circle cx="32" cy="32" r="31" fill="#ffffff"/>
          <circle cx="32" cy="32" r="31" fill="none" stroke="#f2a93b" stroke-width="1.5"/>
          <text x="32" y="30" text-anchor="middle" font-family="Vazirmatn, sans-serif" font-size="17" font-weight="800" fill="#073b5c">الخلیل</text>
          <line x1="18" y1="38" x2="46" y2="38" stroke="#f2a93b" stroke-width="1.5"/>
          <text x="32" y="49" text-anchor="middle" font-family="Vazirmatn, sans-serif" font-size="8" font-weight="600" fill="#0d5c8c" letter-spacing="0.5">SARAVAN</text>
        </svg>
      </div>
      <div class="hdr-info">
        <h1>فروشگاه الخلیل</h1>
        <p><span class="dot"></span>سراوان · لوازم خیاطی</p>
      </div>
      <div class="hdr-actions">
        <button class="hdr-btn" onclick="showTracking()">📦</button>
        <button class="hdr-btn" onclick="openAdmin()">⚙️</button>
      </div>
    </div>
    <div class="hdr-collapsible" id="hdrCollapsible">
      <div class="search-bar">
        <svg width="14" height="14" viewBox="0 0 24 24"><path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" stroke="rgba(255,255,255,.7)" stroke-width="2" fill="none" stroke-linecap="round"/></svg>

function buildPcard(p) {

  if (p.sizes && p.sizes.length) {
    rows = p.sizes.map(s=>`<div class="pcard-row"><span class="pcard-slabel">${s.label}</span><span class="pcard-price">${fmt(s.price)}</span></div>`).join('');
  } else {
    rows = `<div class="pcard-row"><span class="pcard-slabel">برند و سایزهای مختلف موجود است</span></div>`;

    ${badge?`<div class="pcard-badge">${badge}</div>`:''}

// ═══════════════ BOT LOGIC ═══════════════
function getResp(text) {
  const t = text.trim().toLowerCase();
  const list = loadP();

  if (/سلام|درود|خوش|hello|hi/.test(t))
    return {text:'سلام! 👋 به فروشگاه لوازم خیاطی الخلیل خوش آمدید.\nلایی چسب، نخ، دکمه، قیچی و لوازم چرخ خیاطی — همه در یک‌جا.',
      quickBtns:['📋 دسته‌بندی محصولات','📏 راهنمای سایز','📦 پیگیری سفارش','📞 اطلاعات تماس']};

  if (/تماس|آدرس|شماره|تلفن|واتساپ|اینستا|اینستاگرام|کجا/.test(t)) { showContact(); return null; }
  if (/راهنما|سایز|اینچ|اندازه/.test(t)) { showSizeGuide(); return null; }
  if (/پیگیری|کد سفارش|وضعیت/.test(t)) { showTracking(); return null; }
  if (/دسته|دسته‌بندی|محصولات$|^محصولات/.test(t)) return {html:buildCatList(), text:'دسته‌بندی محصولات الخلیل:'};

  if (/مقایسه|فرق|تفاوت|بهتر|کدام بهتر/.test(t))
    return {text:'🔍 مقایسه لایی چسب جرمنی و مکران:\n\n⭐ جرمنی (درجه یک): کیفیت بالاتر، چسبندگی قوی‌تر، دوام بیشتر\n✅ مکران (درجه دو): قیمت مناسب‌تر، مناسب تولید انبوه',
      quickBtns:['لایی چسب جرمنی','لایی چسب مکران']};

  if (/همه|کل|لیست/.test(t))
    return {html:list.map(p=>buildPcard(p)).join(''), text:'همه محصولات فروشگاه الخلیل:'};

  // category keyword matches
  if (/لایی|چسب|یقه|کالر|رول|شیروانی/.test(t))
    return {html:filterProds('layi').map(p=>buildPcard(p)).join(''), text:'محصولات لایی چسب:'};
  if (/دکمه/.test(t))
    return {html:filterProds('button').map(p=>buildPcard(p)).join(''), text:'انواع دکمه:'};
  if (/نخ/.test(t))
    return {html:filterProds('thread').map(p=>buildPcard(p)).join(''), text:'انواع نخ:'};
  if (/قیچی/.test(t))
    return {html:filterProds('scissors').map(p=>buildPcard(p)).join(''), text:'انواع قیچی:'};
  if (/چرخ|سوزن|ماسوره|ماکو/.test(t))
    return {html:filterProds('machine').map(p=>buildPcard(p)).join(''), text:'لوازم چرخ خیاطی:'};

  for (const p of list) {
    const words = p.name.split(' ').filter(w=>w.length>1);
    if (words.some(w=>t.includes(w.toLowerCase())))
      return {html:buildPcard(p), text:`${p.name}:`};
  }

  return {text:'می‌توانم در مورد این موارد کمک کنم:',
    quickBtns:['📋 دسته‌بندی محصولات','📏 راهنمای سایز','🔍 مقایسه جرمنی و مکران','📦 پیگیری سفارش','📞 اطلاعات تماس']};
}

// Compress + resize image client-side before storing as base64 (keeps localStorage usage low)
function compressImage(file, maxDim, quality, callback) {
  if (!file.type || !file.type.startsWith('image/')) { callback(null, 'not-image'); return; }
  let done = false;
  const safeCallback = (url, err) => { if (done) return; done = true; callback(url, err); };
  const failTimer = setTimeout(() => safeCallback(null, 'timeout'), 8000);

  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      clearTimeout(failTimer);
      try {
        let w = img.width, h = img.height;
        if (!w || !h) { safeCallback(null, 'bad-dims'); return; }
        if (w > h && w > maxDim) { h = Math.round(h * maxDim / w); w = maxDim; }
        else if (h >= w && h > maxDim) { w = Math.round(w * maxDim / h); h = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', quality);
        safeCallback(dataUrl, null);
      } catch(err) { safeCallback(null, err); }
    };
    img.onerror = () => { clearTimeout(failTimer); safeCallback(null, 'decode-error'); };
    img.src = e.target.result;
  };
  reader.onerror = () => { clearTimeout(failTimer); safeCallback(null, 'read-error'); };
  reader.readAsDataURL(file);
}

function resetDef() { if(!confirm('همه تغییرات محصولات پاک می‌شود. ادامه می‌دهید؟'))return; saveP(JSON.parse(JSON.stringify(DEFAULT_PRODUCTS))); prods=loadP(); renderProdsTab(); alert('بازگردانی انجام شد.') }

    setTimeout(()=>addQuick(['📋 دسته‌بندی محصولات','📏 راهنمای سایز','🔍 مقایسه جرمنی و مکران','📦 پیگیری سفارش','📞 اطلاعات تماس']),400);

// Keep messages scrolled to bottom when keyboard opens/closes (fixed positioning handles the rest)
function fixShellHeight() {
  const msgs = document.getElementById('msgs');
  if (msgs) msgs.scrollTop = msgs.scrollHeight;
}

// Collapse header (search + filters) when the on-screen keyboard is open, so message bubbles
// stay visible between the profile bar and the input — like WhatsApp's compact header.
let initialViewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
function handleViewportResize() {
  const hdr = document.querySelector('.hdr');
  const currentHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  const shrunk = initialViewportHeight - currentHeight;
  if (hdr) {
    if (shrunk > 120) hdr.classList.add('compact');
    else hdr.classList.remove('compact');
  }
  fixShellHeight();
}
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', handleViewportResize);
} else {
  window.addEventListener('resize', handleViewportResize);
}
const userInpEl = document.getElementById('userInp');
if (userInpEl) {
  userInpEl.addEventListener('focus', () => {
    document.querySelector('.hdr')?.classList.add('compact');
    setTimeout(fixShellHeight, 300);
  });
  userInpEl.addEventListener('blur', () => {
    setTimeout(() => {
      const currentHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      if (initialViewportHeight - currentHeight < 120) {
        document.querySelector('.hdr')?.classList.remove('compact');
      }
    }, 200);
  });
}
